monitor=,preferred,auto,1

# ── Autostart ──
exec-once = env QT_MEDIA_BACKEND=ffmpeg qs
exec-once = pkill dunst
exec-once = pkill mako
exec-once = pkill swaync
exec-once = awww-daemon
exec-once = ~/.config/quickshell/lock.sh
exec-once = udiskie
exec-once = /usr/bin/waybar
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = ~/.config/quickshell/wave-check.sh
# ── Environnement ──
env = PATH,/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# ── Entrée ──
input {
    kb_layout = us          
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ── Général ──
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(c8b89aee)
    col.inactive_border = rgba(1a1814aa)
    layout = dwindle
}

# ── Décoration ──
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# ── Animations ──
animations {
    enabled = true
    bezier = niercurve, 0.4, 0, 0.2, 1
    animation = windows,      1, 4, niercurve, slide
    animation = windowsOut,   1, 3, niercurve, slide
    animation = fade,         1, 4, niercurve
    animation = workspaces,   1, 5, niercurve, slidevert
}

# ── Layout dwindle ──
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Layout master ──
master {
    new_status = master
    mfact = 0.55
}

# ── Règles fenêtres Quickshell ──
windowrule = float on,     match:class ^(quickshell)$
windowrule = pin on,       match:class ^(quickshell)$
windowrule = no_blur on,   match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$
windowrule = workspace special:spotify, match:class ^(Spotify)$
windowrule = fullscreen on,             match:class ^(Spotify)$

# ══════════════════════════════════════════════════
# RACCOURCIS
# ══════════════════════════════════════════════════

# ── Launcher (menu applications) ──
bindr = SUPER, Super_L, exec, echo t >> /tmp/qs-menu    # SUPER + SUPER → ouvre/ferme le menu (pour éviter les conflits avec d'autres raccourcis utilisant SUPER)

# ── Lockscreen Quickshell ──
bindr = SUPER, L, exec, ~/.config/quickshell/lock.sh

# ── Player Quickshell ──
bind = SUPER, Return,       exec, echo t >> /tmp/qs-toggle
bind = SUPER SHIFT, Return, exec, echo t >> /tmp/qs-front

# ── Applications ──
bind = SUPER, T, exec, /usr/bin/kitty
bind = SUPER, M, exec, pgrep -x spotify >/dev/null && hyprctl dispatch togglespecialworkspace spotify || spotify
bind = SUPER, R, exec, pkill qs
bind = SUPER, P, exec, ~/.config/quickshell/wallpaper.sh

# ── Gestion des fenêtres ──
bind = SUPER, Q,      killactive
bind = SUPER, F,      fullscreen
bind = SUPER, V,      togglefloating
bind = SUPER, Escape, exit
bind = SUPER, D,      fullscreen, 1
bind = SUPER, W,       exec, hyprctl keyword general:layout master
bind = SUPER SHIFT, W, exec, hyprctl keyword general:layout dwindle

# ── Focus ──
bind = ALT,       Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# ── Focus directionnel ──
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# ── Déplacement de fenêtre ──
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# ── Special workspace ──
bind = SUPER SHIFT, S, movetoworkspace, special:magic
bind = SUPER,       S, togglespecialworkspace, magic

# ── Workspaces — ALT + AZERTY ──
bind = ALT, a, workspace, 1
bind = ALT, z, workspace, 2
bind = ALT, e, workspace, 3
bind = ALT, r, workspace, 4
bind = ALT, t, workspace, 5
bind = ALT, y, workspace, 6
bind = ALT, u, workspace, 7
bind = ALT, i, workspace, 8
bind = ALT, o, workspace, 9
bind = ALT, p, workspace, 10

# ── Déplacer vers workspace ──
bind = SUPER SHIFT, a, movetoworkspace, 1
bind = SUPER SHIFT, z, movetoworkspace, 2
bind = SUPER SHIFT, e, movetoworkspace, 3
bind = SUPER SHIFT, r, movetoworkspace, 4
bind = SUPER SHIFT, t, movetoworkspace, 5
bind = SUPER SHIFT, y, movetoworkspace, 6
bind = SUPER SHIFT, u, movetoworkspace, 7
bind = SUPER SHIFT, i, movetoworkspace, 8
bind = SUPER SHIFT, o, movetoworkspace, 9
bind = SUPER SHIFT, p, movetoworkspace, 10

# ── Scroll workspaces ──
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# ── Souris ──
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Audio ──
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ── Luminosité ──
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Capture d'écran ──
bind = ALT SHIFT, S, exec, hyprshot -m region 
bind = , Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +%Y%m%d_%H%M%S).png



# ═══════════════════════════════════════════════════════════════════
# User overrides — see user.conf
# This file is created empty by the installer and is NEVER overwritten
# by future updates. Put your monitor setup, custom binds, env vars,
# theme tweaks, etc. there.
# ═══════════════════════════════════════════════════════════════════
source = ~/.config/hypr/user.conf